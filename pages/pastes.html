<!DOCTYPE html>
<html>
  <head>
    {{head}}

    <title>{{paste_hash}} | BlinkBin</title>
    <style>
      body {
        display: flex;
        flex-direction: column;
      }

      .wrap {
        width: 100%;
        max-width: 1024px;
        margin: 0 auto;
        padding: 1rem;
        flex: 1;
      }

      .card {
        background: var(--card);
        border-radius: 1rem;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      pre {
        margin: 0;
        padding: 1rem;
        border-radius: 10px;
        background: var(--bg);
        overflow-x: auto;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    {{header}}

    <main class="wrap">
      <section class="card">
        <h1>Paste <code>{{paste_hash}}</code></h1>
        <pre id="paste">{{paste_text}}</pre>
        <button onclick="copyPaste()">Copy</button>
        <p id="status"></p>
      </section>
    </main>

    {{footer}}

    <script>
      async function temporaryUpdate(element, textContent, color, ms) {
        const originalText = element.textContent;
        const originalColor = element.style.color;

        element.textContent = textContent;
        element.style.color = color;

        setTimeout(() => {
          element.textContent = originalText;
          element.style.color = originalColor;
        }, ms);
      }

      async function copyPaste() {
        const status = document.getElementById("status");
        const paste = document.getElementById("paste");

        try {
          await navigator.clipboard.writeText(paste.innerText);
          await temporaryUpdate(status, "Copied to clipboard!", "#8ec07c", 2000);
        } catch (err) {
          await temporaryUpdate(status, "Copy failed.", "#fb4934", 5000);
        }
      }
    </script>
  </body>
</html>
